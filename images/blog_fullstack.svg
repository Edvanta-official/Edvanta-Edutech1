<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
      <defs>
        <linearGradient id="bg_fs" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#0f172a"/>
          <stop offset="100%" stop-color="#1e1b4b"/>
        </linearGradient>
        <linearGradient id="accent_fs" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
      </defs>
      <rect width="800" height="450" fill="url(#bg_fs)"/>
      <rect x="60" y="50" width="680" height="350" rx="16" fill="#1e293b" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
      <circle cx="95" cy="80" r="7" fill="#ef4444"/>
      <circle cx="120" cy="80" r="7" fill="#f59e0b"/>
      <circle cx="145" cy="80" r="7" fill="#10b981"/>
      <rect x="180" y="70" width="300" height="20" rx="6" fill="#0f172a"/>
      <text x="195" y="84" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8">https://localhost:3000/app/fullstack-react</text>
      <!-- CodeLines -->
      <text x="95" y="140" font-family="monospace" font-size="16" fill="#6366f1">import</text>
      <text x="165" y="140" font-family="monospace" font-size="16" fill="#38bdf8">React, { useState, useEffect }</text>
      <text x="445" y="140" font-family="monospace" font-size="16" fill="#6366f1">from</text>
      <text x="495" y="140" font-family="monospace" font-size="16" fill="#a855f7">'react'</text>
      <text x="95" y="175" font-family="monospace" font-size="16" fill="#f43f5e">const</text>
      <text x="155" y="175" font-family="monospace" font-size="16" fill="#facc15">FullStackApp</text>
      <text x="285" y="175" font-family="monospace" font-size="16" fill="#38bdf8">= () =&gt; {</text>
      <text x="125" y="210" font-family="monospace" font-size="16" fill="#f43f5e">const</text>
      <text x="185" y="210" font-family="monospace" font-size="16" fill="#38bdf8">[data, setData] = useState(null)</text>
      <text x="125" y="245" font-family="monospace" font-size="16" fill="#38bdf8">useEffect(() =&gt; { fetch('/api/v1/nodes').then(res =&gt; res.json()) }, [])</text>
      <text x="125" y="280" font-family="monospace" font-size="16" fill="#facc15">return</text>
      <text x="195" y="280" font-family="monospace" font-size="16" fill="#38bdf8">&lt;div className="mern-architecture"&gt;...&lt;/div&gt;</text>
      <text x="95" y="315" font-family="monospace" font-size="16" fill="#38bdf8">}</text>
      <!-- Badges -->
      <rect x="520" y="310" width="90" height="32" rx="8" fill="#6366f1"/>
      <text x="545" y="331" font-family="'Poppins', sans-serif" font-weight="800" font-size="13" fill="#ffffff">REACT</text>
      <rect x="620" y="310" width="90" height="32" rx="8" fill="#10b981"/>
      <text x="640" y="331" font-family="'Poppins', sans-serif" font-weight="800" font-size: 13; fill="#ffffff">NODE</text>
    </svg>